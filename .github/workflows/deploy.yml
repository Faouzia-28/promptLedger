name: Deploy to AWS (3-Instance)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ap-southeast-1
  PROJECT_NAME: promptledger

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for backend)
        if: matrix.service == 'backend'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up Node.js (for frontend)
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Python dependencies
        if: matrix.service == 'backend'
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Node dependencies
        if: matrix.service == 'frontend'
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build and test backend
        if: matrix.service == 'backend'
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          # Run linting
          flake8 app --max-line-length=120 --ignore=E203,W503 || true
          # Run tests
          pytest tests/ -v --cov=app --cov-report=xml || true

      - name: Build and test frontend
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run lint || true
          npm run build

      - name: Upload coverage to Codecov (backend)
        if: matrix.service == 'backend'
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend
        run: |
          # SSH into backend instance and pull latest code
          ssh -i ${{ secrets.AWS_PRIVATE_KEY }} \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.BACKEND_INSTANCE_IP }} \
            "cd /opt/promptledger/backend && \
             git pull origin main && \
             source venv/bin/activate && \
             pip install -r requirements.txt && \
             pm2 restart promptledger-api && \
             pm2 restart promptledger-celery && \
             pm2 restart promptledger-beat"

      - name: Deploy frontend
        run: |
          # SSH into frontend instance and pull latest code
          ssh -i ${{ secrets.AWS_PRIVATE_KEY }} \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.FRONTEND_INSTANCE_IP }} \
            "cd /opt/promptledger/frontend && \
             git pull origin main && \
             npm ci && \
             NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} npm run build && \
             pm2 restart promptledger-frontend"

  smoke-tests:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          # Test frontend
          curl -f http://${{ secrets.FRONTEND_INSTANCE_IP }}:3000 || exit 1
          
          # Test backend health
          curl -f http://${{ secrets.BACKEND_INSTANCE_IP }}:8000/health || exit 1
          
          # Test backend metrics
          curl -f http://${{ secrets.BACKEND_INSTANCE_IP }}:8000/metrics || exit 1

      - name: Slack notification (success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Deployment successful to ${{ env.PROJECT_NAME }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Successful*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

      - name: Slack notification (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Deployment failed for ${{ env.PROJECT_NAME }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

  rollback:
    if: failure()
    runs-on: ubuntu-latest
    needs: smoke-tests

    steps:
      - name: Rollback backend
        run: |
          ssh -i ${{ secrets.AWS_PRIVATE_KEY }} \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.BACKEND_INSTANCE_IP }} \
            "cd /opt/promptledger/backend && \
             git revert HEAD --no-edit && \
             source venv/bin/activate && \
             pm2 restart all"

      - name: Rollback frontend
        run: |
          ssh -i ${{ secrets.AWS_PRIVATE_KEY }} \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.FRONTEND_INSTANCE_IP }} \
            "cd /opt/promptledger/frontend && \
             git revert HEAD --no-edit && \
             npm run build && \
             pm2 restart promptledger-frontend"
