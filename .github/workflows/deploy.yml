name: Deploy PromptLedger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: Target environment
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PROJECT_NAME: promptledger

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.service == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Python dependencies
        if: matrix.service == 'backend'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Node dependencies
        if: matrix.service == 'frontend'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build and test backend
        if: matrix.service == 'backend'
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
          pytest tests/ -v --cov=app --cov-report=xml

      - name: Build and test frontend
        if: matrix.service == 'frontend'
        working-directory: frontend
        run: |
          npm ci
          npm run lint || true
          npm run build

  deploy-backend:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_PRIVATE_KEY }}" > ~/.ssh/promptledger_deploy
          chmod 600 ~/.ssh/promptledger_deploy
          ssh-keyscan -H "${{ secrets.BACKEND_INSTANCE_IP }}" >> ~/.ssh/known_hosts

      - name: Sync backend source
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude 'node_modules' \
            --exclude '.next' \
            backend/ \
            ubuntu@${{ secrets.BACKEND_INSTANCE_IP }}:/opt/promptledger/backend/
          rsync -az \
            docker-compose.prod.yml \
            ubuntu@${{ secrets.BACKEND_INSTANCE_IP }}:/opt/promptledger/docker-compose.prod.yml

      - name: Prune backend host copies
        run: |
          ssh -i ~/.ssh/promptledger_deploy ubuntu@${{ secrets.BACKEND_INSTANCE_IP }} '
            set -e
            rm -rf /opt/promptledger/frontend /opt/promptledger/frontend_copy_* /opt/promptledger/backend_copy_*
            cd /opt/promptledger
            sudo docker compose -f docker-compose.prod.yml up -d --build api celery-worker celery-beat
            sudo docker compose -f docker-compose.prod.yml ps
          '

  deploy-frontend:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_PRIVATE_KEY }}" > ~/.ssh/promptledger_deploy
          chmod 600 ~/.ssh/promptledger_deploy
          ssh-keyscan -H "${{ secrets.FRONTEND_INSTANCE_IP }}" >> ~/.ssh/known_hosts

      - name: Sync frontend source
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            frontend/ \
            ubuntu@${{ secrets.FRONTEND_INSTANCE_IP }}:/opt/promptledger/frontend/

      - name: Prune frontend host copies
        run: |
          ssh -i ~/.ssh/promptledger_deploy ubuntu@${{ secrets.FRONTEND_INSTANCE_IP }} '
            set -e
            rm -rf /opt/promptledger/backend /opt/promptledger/backend_copy_* /opt/promptledger/frontend_copy_*
            cd /opt/promptledger/frontend
            npm ci
            NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} npm run build
            pm2 restart promptledger-frontend
            pm2 save
            pm2 list
          '

  smoke-tests:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Run smoke tests
        run: |
          curl -f http://${{ secrets.FRONTEND_INSTANCE_IP }}:3000/login
          curl -f http://${{ secrets.BACKEND_INSTANCE_IP }}:8000/health
          curl -f http://${{ secrets.BACKEND_INSTANCE_IP }}:8000/metrics

      - name: Slack notification (success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Deployment successful to ${{ env.PROJECT_NAME }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Successful*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

      - name: Slack notification (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Deployment failed for ${{ env.PROJECT_NAME }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
